services:
  mysql:
    image: mysql:8.0
    container_name: timesheet-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-timesheet_management}
      MYSQL_USER: ${MYSQL_USER:-timesheet}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-timesheet_secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
      MYSQL_MASTER_DUMP_DATABASE: ${MYSQL_MASTER_DUMP_DATABASE:-master_db}
      MYSQL_SUB_DUMP_DATABASE: ${MYSQL_SUB_DUMP_DATABASE:-sub_company_db}
      TZ: ${TZ:-UTC}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "127.0.0.1:${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
      - ./backend/master_db.sql:/tmp/master_db.sql:ro
      - ./backend/sub_company_db.sql:/tmp/sub_company_db.sql:ro
    networks:
      - timesheet-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: app
    container_name: timesheet-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8002}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-timesheet_management}
      DB_USERNAME: ${MYSQL_USER:-timesheet}
      DB_PASSWORD: ${MYSQL_PASSWORD:-timesheet_secret}
      CACHE_STORE: ${CACHE_STORE:-database}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-sync}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      RUN_LARAVEL_CACHE: ${RUN_LARAVEL_CACHE:-true}
    volumes:
      - backend_storage:/var/www/html/storage
      - backend_cache:/var/www/html/bootstrap/cache
    networks:
      - timesheet-network
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php -v >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  backend-nginx:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: nginx
    container_name: timesheet-backend-nginx
    restart: unless-stopped
    ports:
      - "${BACKEND_HTTP_PORT:-8002}:80"
    volumes:
      - backend_storage:/var/www/html/storage:ro
    networks:
      - timesheet-network
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/api >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_IMAGE_BASE_URL: ${VITE_IMAGE_BASE_URL:-/storage}
    container_name: timesheet-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_HTTP_PORT:-3001}:80"
    networks:
      - timesheet-network
    depends_on:
      backend-nginx:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: timesheet-frontend-dev
    profiles:
      - dev
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
      VITE_IMAGE_BASE_URL: ${VITE_IMAGE_BASE_URL:-/storage}
    ports:
      - "${FRONTEND_DEV_PORT:-3001}:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - timesheet-network
    depends_on:
      backend-nginx:
        condition: service_healthy

networks:
  timesheet-network:
    name: timesheet-network
    driver: bridge

volumes:
  mysql_data:
  backend_storage:
  backend_cache:
  frontend_node_modules:
